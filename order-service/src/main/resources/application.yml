server:
  port: 8082

spring:
  application:
    name: order-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shopdb}
    username: ${DB_USER:shopuser}
    password: ${DB_PASSWORD:shoppass123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  pattern:
    console: "%d{HH:mm:ss} %clr(%-5level) %msg%n"
  level:
    com.shop: INFO
